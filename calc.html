<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>计算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
body{
background: linear-gradient(135deg, #11998E 0%, #38EF7D 100%);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}
.calc-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:30px;
border-radius:26px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
width:360px;
text-align:center;
color:white;
}
h2{
margin-bottom:20px;
font-size:28px;
}
#screen{
width:100%;
height:70px;
background:rgba(255,255,255,0.2);
border:none;
border-radius:16px;
margin-bottom:20px;
font-size:32px;
text-align:right;
padding-right:16px;
color:white;
}
.btns{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}
.btn{
height:60px;
font-size:22px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.2);
color:white;
cursor:pointer;
transition:0.2s;
}
.btn:hover{
background:rgba(255,255,255,0.3);
}
.opt{
background:rgba(255,255,255,0.35);
font-weight:bold;
}
.eq{
grid-column:span 4;
background:rgba(255,255,255,0.4);
font-size:24px;
}
#res{
margin-top:16px;
font-size:24px;
font-weight:bold;
height:30px;
}
.back{
margin-top:20px;
padding:10px 24px;
background:rgba(255,255,255,0.2);
color:white;
border:1px solid rgba(255,255,255,0.4);
border-radius:12px;
cursor:pointer;
}
</style>
</head>
<body>
<div class="calc-box">
<h2>简易计算器</h2>
<input id="screen" readonly>
<div class="btns">
<button class="btn" onclick="input('7')">7</button>
<button class="btn" onclick="input('8')">8</button>
<button class="btn" onclick="input('9')">9</button>
<button class="btn opt" onclick="input('/')">÷</button>

<button class="btn" onclick="input('4')">4</button>
<button class="btn" onclick="input('5')">5</button>
<button class="btn" onclick="input('6')">6</button>
<button class="btn opt" onclick="input('*')">×</button>

<button class="btn" onclick="input('1')">1</button>
<button class="btn" onclick="input('2')">2</button>
<button class="btn" onclick="input('3')">3</button>
<button class="btn opt" onclick="input('-')">-</button>

<button class="btn" onclick="input('0')">0</button>
<button class="btn" onclick="input('.')">.</button>
<button class="btn opt" onclick="input('')">C</button>
<button class="btn opt" onclick="input('+')">+</button>

<button class="btn eq" onclick="calc()">=</button>
</div>
<div id="res"></div>
<button class="back" onclick="history.back()">返回</button>
</div>

<script>
let screen = document.getElementById('screen');
function input(val){
    if(val === ''){
        screen.value = '';
    } else {
        screen.value += val;
    }
}
function calc(){
    try {
        let exp = screen.value.replace('×', '*').replace('÷', '/');
        res.innerText = "结果：" + eval(exp);
    } catch(e){
        res.innerText = "输入错误";
    }
}
</script>
</body>
</html>
